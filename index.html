<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <!-- ><-->
    <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet" />
    
    <title>FF Tournament</title>
    <style>

    </style>
</head>

<body>
    <div class="app">
        <header>
            <div class="logo"> FF Tournament </div>
            <div class="icon"> 🔔 </div>
        </header>
        <div class="pages">
            <!-- HOME -->
            <div class="page active" id="home">
                <div id="login"></div>
                <div class="banners"></div>
                <div class="lives"></div>
                <div class="upcomings"></div>
                <div class="space"></div>
            </div>
            <!-- SEARCH -->
            <div class="page" id="search">
                <input class="search" oninput="searchResult()" placeholder="Search tournament or players...">
                <div id="searchResult"></div>
                <h3 class="section-title"> Popular </h3>
                <div class="card"> Champions Cup </div>
                <div class="card"> Lone Wolf League </div>
                <div class="card"> Custom Room </div>
                <div class="space"></div>
            </div>
            <!-- PROFILE -->
            <div class="page" id="profile">
                <div class="profile userProfile">
                    <div class="avatar"></div>
                    <div class="name" id="name"> username </div>
                    <div class="uid" id="uid"> UID : xxxxx000 </div>
                    <div class="stats">
                        <div class="stat">
                            <h3>28</h3> Match
                        </div>
                        <div class="stat">
                            <h3>12</h3> Wins
                        </div>
                        <div class="stat">
                            <h3>2.45</h3> KD
                        </div>
                    </div>
                    <div class="menu">
                        <div class="item"> My Teams > </div>
                        <div class="item"> Wallet > </div>
                        <div class="item"> History > </div>
                        <div class="item"> Settings > </div>
                    </div>
                    <div class="menu">
                        <div class="item"><a href="https://webed-editor.github.io/fft/auth/login.html"> Log out </a></div>
                    </div>
                </div>
                <div class="space"></div>
            </div>
            <!-- other profiles -->
            <div class="page">
                <div id="otherProfile"></div>
                <div class="space"></div>
            </div>
        </div>
        <div class="bottom">
            <div class="tab active" data="home">
               <svg class="active" xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960"><path d="M240-200h120v-240h240v240h120v-360L480-740 240-560v360Zm-80 80v-480l320-240 320 240v480H520v-240h-80v240H160Zm320-350Z"/></svg>
               Home
            </div>
            <div class="tab" data="search">
               <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960"><path d="M784-120 532-372q-30 24-69 38t-83 14q-109 0-184.5-75.5T120-580q0-109 75.5-184.5T380-840q109 0 184.5 75.5T640-580q0 44-14 83t-38 69l252 252-56 56ZM380-400q75 0 127.5-52.5T560-580q0-75-52.5-127.5T380-760q-75 0-127.5 52.5T200-580q0 75 52.5 127.5T380-400Z"/></svg>
               Search
            </div>
            <div class="tab" data="profile">
               <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960"><path d="M234-276q51-39 114-61.5T480-360q69 0 132 22.5T726-276q35-41 54.5-93T800-480q0-133-93.5-226.5T480-800q-133 0-226.5 93.5T160-480q0 59 19.5 111t54.5 93Zm146.5-204.5Q340-521 340-580t40.5-99.5Q421-720 480-720t99.5 40.5Q620-639 620-580t-40.5 99.5Q539-440 480-440t-99.5-40.5ZM480-80q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm100-95.5q47-15.5 86-44.5-39-29-86-44.5T480-280q-53 0-100 15.5T294-220q39 29 86 44.5T480-160q53 0 100-15.5ZM523-537q17-17 17-43t-17-43q-17-17-43-17t-43 17q-17 17-17 43t17 43q17 17 43 17t43-17Zm-43-43Zm0 360Z"/></svg>
               You
            </div>
        </div>
    </div>
    
    <script>
        ///
    let tabs = document.querySelectorAll(".tab");
    let pages = document.querySelectorAll(".page");
    tabs.forEach(tab => {
        tab.onclick = () => {
            tabs.forEach(t => t.classList.remove("active"));
            tabs.forEach(t => t.querySelector("svg").classList.remove("active"));
            pages.forEach(p => p.classList.remove("active"));
            tab.classList.add("active");
            tab.querySelector("svg").classList.add("active");
            document.getElementById(tab.getAttribute("data")).classList.add("active");
        }
    });

    (() => {
        if (!localStorage.getItem("fft-userDetails")){
            document.querySelector('.userProfile').innerHTML = `
               <a style="background: var(--gold); color: black; padding: 10px;" href="https://webed-editor.github.io/fft/auth/signup.html">Create Account</a>
               <a style="background: var(--gold); color: black; padding: 10px;" href="https://webed-editor.github.io/fft/auth/login.html">Login Account</a>
            `;
        } else {
            const dd = JSON.parse(localStorage.getItem("fft-userDetails"));
            document.querySelector('#name').textContent = dd.name;
            document.querySelector('#uid').textContent = dd.uid;
        }
    })();
    </script>
    
</body>

</html>
