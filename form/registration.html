<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<script src="https://webed-editor.github.io/fft/form/form.js" defer></script>

<title>FF Tournament Registration</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0d1117;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    color:#fff;
    padding:20px;
}

.form{
    width:100%;
    max-width:420px;
    background:#151b29;
    border:1px solid #2c3445;
    border-radius:18px;
    overflow:hidden;
}

/* Layer 1 */

.top{
    padding:25px;
    background:linear-gradient(135deg,#4b00ff,#7d3cff);
    text-align:center;
}

.top h1{
    font-size:28px;
    margin-bottom:10px;
}

.info{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-top:18px;
}

.box{
    background:rgba(255,255,255,.12);
    border-radius:12px;
    padding:10px;
}

.box span{
    display:block;
    font-size:12px;
    opacity:.8;
}

.box b{
    font-size:18px;
}

/* Layer 2 */

.players{
    padding:20px;
}

.player{
    background:#1d2435;
    border-radius:12px;
    padding:15px;
    margin-bottom:16px;
}

.player h3{
    margin-bottom:12px;
    color:#ffd54a;
    font-size:16px;
}

input{
    width:100%;
    height:45px;
    margin-bottom:10px;
    border:none;
    outline:none;
    border-radius:10px;
    padding:0 14px;
    background:#2b3447;
    color:#fff;
}

input::placeholder{
    color:#aaa;
}

/* Layer 3 */

.bottom{
    padding:20px;
}

button{
    width:100%;
    height:52px;
    border:none;
    border-radius:12px;
    background:#ffd54a;
    color:#111;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}
</style>
</head>

<body>

<div class="form">

    <!-- Layer 1 -->

    <div class="top">
        <h1>FREE FIRE TOURNAMENT</h1>

        <div class="info">
            <div class="box">
                <span>Prize Pool</span>
                <b>₹10,000</b>
            </div>

            <div class="box">
                <span>Entry Fee</span>
                <b>₹200</b>
            </div>

            <div class="box">
                <span>Mode</span>
                <b>Squad</b>
            </div>

            <div class="box">
                <span>Date</span>
                <b>10 July</b>
            </div>
        </div>
    </div>

    <!-- Layer 2 -->

    <div class="players">

        <div class="player">
            <h3>Player 1</h3>
            <input type="text" placeholder="UID">
            <input type="text" placeholder="FFID">
        </div>

        <div class="player">
            <h3>Player 2</h3>
            <input type="text" placeholder="UID">
            <input type="text" placeholder="FFID">
        </div>

        <div class="player">
            <h3>Player 3</h3>
            <input type="text" placeholder="UID">
            <input type="text" placeholder="FFID">
        </div>

        <div class="player">
            <h3>Player 4</h3>
            <input type="text" placeholder="UID">
            <input type="text" placeholder="FFID">
        </div>

    </div>

    <!-- Layer 3 -->

    <div class="bottom">
        <button>REGISTER NOW</button>
    </div>

</div>

</body>
</html>
